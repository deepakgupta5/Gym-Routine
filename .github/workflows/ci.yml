name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  db_free_tests_and_build:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: postgresql://ci:ci@localhost:5432/ci
      SINGLE_USER_ID: 00000000-0000-0000-0000-000000000001
      APP_PASSCODE_HASH: $2b$10$abcdefghijklmnopqrstuv123456789012345678901234567890
      COOKIE_SIGNING_SECRET: ci-cookie-signing-secret
      ADMIN_SECRET: ci-admin-secret
      OPENAI_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:ci
      - run: npm run build

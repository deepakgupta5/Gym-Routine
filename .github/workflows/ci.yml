name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  db_free_tests_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:ci
      - run: npm run build
